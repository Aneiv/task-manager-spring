spring.application.name=demo


spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/db}
spring.datasource.username=${POSTGRES_USER:admin}
spring.datasource.password=${POSTGRES_PASSWORD:123}

# Auto reset and create database when running app
spring.jpa.hibernate.ddl-auto=create

# First create tables, then insert data
spring.jpa.defer-datasource-initialization=true

# Initialize data with app start
spring.sql.init.mode=always

# Data location
spring.sql.init.data-locations=classpath:sql/database_test_data.sql 
# Debug
spring.jpa.show-sql=true
# Debug Security
logging.level.org.springframework.security=DEBUG

# JWT secret key
app.jwt.secret=${JWT_SECRET_KEY}
# in milliseconds
security.jwt.expiration-time=${JWT_EXPIRATION}


spring.jpa.properties.hibernate.format_sql=true